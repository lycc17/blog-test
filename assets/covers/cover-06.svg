<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#070A12"/>
      <stop offset="0.6" stop-color="#1A103D"/>
      <stop offset="1" stop-color="#FF00CC" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="blurGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g filter="url(#blurGlow)" opacity="0.6">
    <ellipse cx="1000" cy="500" rx="300" ry="150" fill="#7C4DFF"/>
    <ellipse cx="200" cy="100" rx="250" ry="100" fill="#00E5FF"/>
  </g>
  <rect x="100" y="150" width="1000" height="330" rx="30" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)"/>
  <text x="150" y="280" font-family="sans-serif" font-size="60" font-weight="bold" fill="#FFFFFF">AI 自动化流</text>
  <text x="150" y="370" font-family="sans-serif" font-size="30" fill="#CCCCCC">OpenClaw + Workflow Automation</text>
</svg>
