<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A12"/>
      <stop offset="0.5" stop-color="#10295C"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="spot" cx="70%" cy="20%" r="70%">
      <stop offset="0" stop-color="#7C4DFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C4DFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="diag" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(20)">
      <path d="M0 0H36" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spot)"/>
  <rect width="1200" height="630" fill="url(#diag)" opacity="0.55"/>

  <g filter="url(#glow)">
    <circle cx="210" cy="460" r="120" fill="rgba(0,229,255,0.12)"/>
    <circle cx="1010" cy="140" r="160" fill="rgba(124,77,255,0.14)"/>
    <path d="M80 520 C240 360 420 340 620 480" fill="none" stroke="rgba(0,229,255,0.55)" stroke-width="8"/>
  </g>

  <rect x="84" y="96" width="1032" height="220" rx="20" fill="rgba(14,22,48,0.62)" stroke="rgba(120,180,255,0.22)"/>
  <text x="130" y="175" font-family="Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="52" font-weight="800" fill="#EAF1FF">AI 实操周刊</text>
  <text x="130" y="240" font-family="Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans